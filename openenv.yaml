name: pr-review-env
version: 2.0.0
description: Deterministic pull request code review triage environment for evaluating decision quality, label selection, priority judgment, and review writing across 100 real-world PR scenarios.
author: Meta Infra Tooling
tags:
  - code-review
  - pull-request
  - triage
  - developer-tooling
  - deterministic-grading
observation_space:
  pr_id: int
  title: str
  description: str
  diff: str
  comments: list[str]
  files_changed: list[str]
  author: str
  base_branch: str
  additions: int
  deletions: int
  current_step: int
  max_steps: int
  task_name: str
  review_stage: str
  stage_prompt: str
action_space:
  decision:
    type: enum
    values: [approve, request_changes, close]
  labels:
    type: list[str]
    values: [bug, security, enhancement, documentation, breaking-change, needs-tests, trivial, urgent]
  priority:
    type: enum
    values: [low, medium, high, critical]
  review_summary:
    type: str
    min_length: 1
    max_length: 500
task_summary:
  total: 100
  easy: 30
  medium: 35
  hard: 35
  categories:
    - typo/documentation fixes
    - dead code removal
    - import ordering / style
    - type hints / annotations
    - dependency pinning
    - null checks / edge cases
    - SQL injection / XSS
    - hardcoded credentials
    - missing input validation
    - CORS / rate limiting
    - cache invalidation
    - breaking API changes
    - database migrations
    - async/await bugs
    - circular imports
    - N+1 queries
    - distributed locks / TTL
    - message queue / DLQ
    - cache stampede
    - JWT / OAuth vulnerabilities
    - K8s / infrastructure misconfig
    - connection pool exhaustion
    - cryptographic nonce reuse
    - deserialization RCE
    - TOCTOU race conditions
    - saga / compensation patterns
    - floating point in finance
    - deadlocks / concurrency
    - service mesh bypass
    - deploy ordering dependencies
tasks:
  - id: easy
    description: Off-by-one bugfix PR in list slicing helper with clear reviewer consensus.
    difficulty: easy
    max_steps: 4
    expected_score_range: [0.05, 0.95]
  - id: medium
    description: Authentication middleware refactor that removes token expiry checks and weakens session security.
    difficulty: medium
    max_steps: 6
    expected_score_range: [0.05, 0.95]
  - id: hard
    description: Redis-backed API gateway rate limiter with TOCTOU race condition under concurrency and conflicting reviewer opinions.
    difficulty: hard
    max_steps: 8
    expected_score_range: [0.05, 0.95]
  # Additional 97 tasks are loaded dynamically from fixtures/pr_easy.json,
  # fixtures/pr_medium.json, and fixtures/pr_hard.json.
  # Use GET /tasks endpoint to see the full list at runtime.
reward:
  description: Stage-aware weighted reward over decision correctness, label F1, priority distance, and evidence-grounded review summary, with contradiction penalties and a 0.02 step penalty beyond step 1, clamped strictly within (0, 1).
baseline_scores:
  easy: 0.85
  medium: 0.62
  hard: 0.35
